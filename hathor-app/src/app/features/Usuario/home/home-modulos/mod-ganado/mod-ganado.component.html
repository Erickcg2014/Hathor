<div class="modulo-card">
  <div class="modulo-header">
    <div class="modulo-header-left">
      <div class="modulo-icono" aria-hidden="true">🐄</div>
      <div>
        <h3 class="modulo-titulo">Inventario Ganado</h3>
        <p class="modulo-subtitulo">Distribución por categoría</p>
      </div>
    </div>
    <a class="modulo-btn" [attr.href]="ruta" (click)="$event.preventDefault()"> Ver más → </a>
  </div>

  @if (loading) {
    <div class="card-loading-mini">
      <app-spinner size="small"></app-spinner>
    </div>
  } @else {
    <div class="modulo-stats-row">
      <div class="modulo-stat">
        <span class="stat-label">Total animales</span>
        <span class="stat-valor">{{ totalAnimales }}</span>
      </div>
    </div>

    @if (distribucionGanado.length > 0) {
      <div class="grafica-mini-wrap grafica-donut">
        <canvas #chartCanvas></canvas>
      </div>
    } @else {
      <div class="card-empty-mini">Sin inventario de ganado registrado</div>
    }
  }
</div>
