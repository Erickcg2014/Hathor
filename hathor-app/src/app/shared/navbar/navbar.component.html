<ng-container>
  <header class="navbar">
    <!-- Izquierda -->
    <div class="navbar-left">
      <img src="assets/hathor-logo.png" alt="Hathor" class="navbar-logo" (click)="irHome()" />
      <span class="navbar-divider"></span>
      <span class="navbar-title">Panel de Control</span>
    </div>

    <!-- Centro: dropdown Mis Hatos -->
    <div class="navbar-center">
      <div class="hatos-dropdown-wrapper">
        <button class="btn-hatos" (click)="toggleDropdown()" [class.active]="dropdownAbierto">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"
            />
          </svg>
          Mis Hatos
          <span class="hatos-count" *ngIf="hatos.length > 0">{{ hatos.length }}</span>
          <svg
            class="chevron"
            [class.rotated]="dropdownAbierto"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            viewBox="0 0 24 24"
          >
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
          </svg>
        </button>

        <!-- Dropdown -->
        <div class="dropdown" [class.visible]="dropdownAbierto">
          <!-- Loading -->
          <div class="dropdown-loading" *ngIf="loadingHatos">
            <app-spinner size="small"></app-spinner>
            <span>Cargando hatos...</span>
          </div>

          <!-- Sin hatos -->
          <div class="dropdown-empty" *ngIf="!loadingHatos && hatos.length === 0">
            <span class="empty-icon">🐄</span>
            <p>Aún no tienes hatos registrados</p>
          </div>

          <!-- Lista de hatos -->
          <ng-container *ngIf="!loadingHatos && hatos.length > 0">
            <div class="dropdown-header">Tus unidades productivas</div>
            <div class="dropdown-list">
              <button class="dropdown-item" *ngFor="let hato of hatos" (click)="irAHato(hato)">
                <div class="hato-avatar">
                  {{ hato.nombreHato.charAt(0).toUpperCase() }}
                </div>
                <div class="hato-info">
                  <span class="hato-nombre">{{ hato.nombreHato }}</span>
                  <span class="hato-meta">{{ hato.departamento }} · {{ hato.ciudad }}</span>
                </div>
                <div class="hato-progress-wrapper">
                  <div
                    class="hato-progress-bar"
                    [style.width.%]="hato.porcentajeCompletitud ?? 25"
                  ></div>
                  <span class="hato-pct">{{ hato.porcentajeCompletitud ?? 25 }}%</span>
                </div>
              </button>
            </div>
          </ng-container>

          <!-- Botón nuevo hato -->
          <div class="dropdown-footer">
            <button class="btn-nuevo-hato" (click)="nuevoHato()">
              <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
              </svg>
              Registrar nuevo hato
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Derecha -->
    <div class="navbar-right">
      <button class="btn-account" (click)="irMiCuenta()">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
          <circle cx="12" cy="7" r="4" />
        </svg>
        Mi Cuenta
      </button>
      <button class="btn-logout" (click)="logout()" [disabled]="logoutLoading">
        <span *ngIf="!logoutLoading" class="btn-inner">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" />
          </svg>
          Salir
        </span>
        <span *ngIf="logoutLoading" class="btn-inner">
          <app-spinner size="small"></app-spinner>
          Saliendo...
        </span>
      </button>
    </div>
  </header>

  @if (seccionActiva && itemsVisibles.length > 0) {
    <nav class="subnav">
      @for (item of itemsVisibles; track item.route) {
        <button
          class="subnav-item"
          [class.activo]="isSubitemActivo(item)"
          (click)="irASubitem(item)"
        >
          {{ item.label }}
        </button>
      }
    </nav>
  }
</ng-container>
